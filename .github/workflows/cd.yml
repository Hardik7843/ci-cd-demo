name: Docker Image CI

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Pull Docker Image
        run: sudo docker pull hardik7843/cicd-pipeline:latest
      - name: Delete Old Container
        run: sudo docker rm -f cicd-pipeline-container || true
      - name: Run Docker Container
        run: sudo docker run -d -p 8080:8080 --name cicd-pipeline-container hardik7843/cicd-pipeline
